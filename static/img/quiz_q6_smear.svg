<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Matcha paper smear test</title>
  <desc id="desc">Two matcha smear streaks on white paper, with a smoother vivid green streak on the left and a grainier duller streak on the right.</desc>
  <defs>
    <linearGradient id="desk" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6f4ee"/>
      <stop offset="100%" stop-color="#ece8df"/>
    </linearGradient>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#beb6ab" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="100%" stop-color="#f8f5ee"/>
    </linearGradient>
    <linearGradient id="smoothSmear" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4f9826"/>
      <stop offset="35%" stop-color="#66b73f"/>
      <stop offset="100%" stop-color="#9dd86c"/>
    </linearGradient>
    <linearGradient id="roughSmear" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7a8b35"/>
      <stop offset="35%" stop-color="#96a64b"/>
      <stop offset="100%" stop-color="#bcc77c"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" fill="url(#desk)"/>

  <g filter="url(#paperShadow)">
    <rect x="86" y="86" width="1028" height="588" rx="28" fill="url(#paper)"/>
  </g>

  <g>
    <circle cx="246" cy="166" r="34" fill="#d7eaa8"/>
    <circle cx="954" cy="166" r="34" fill="#d8d1a0"/>
    <text x="246" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#3f5a1c">A</text>
    <text x="954" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#615e2a">B</text>
  </g>

  <g opacity="0.12">
    <path d="M160 254h880" stroke="#9f9887" stroke-width="2"/>
    <path d="M160 500h880" stroke="#9f9887" stroke-width="2"/>
  </g>

  <g>
    <path d="M196 350c66-52 183-56 333-48c53 3 94 11 126 33c15 11 17 28 5 44c-26 36-74 50-133 55c-179 15-292 5-359-12c-28-7-51-18-64-36c-14-18-8-29 10-36c19-8 50-1 82 0z" fill="url(#smoothSmear)"/>
    <path d="M708 353c54-44 164-57 300-48c63 4 115 14 144 34c18 12 20 30 7 46c-32 38-98 50-170 56c-160 13-242 1-289-12c-40-11-72-24-89-42c-13-14-8-24 12-31c24-9 55-5 85-3z" fill="url(#roughSmear)"/>

    <path d="M207 357c104-12 217-12 357 2" fill="none" stroke="#9fda70" stroke-width="10" stroke-linecap="round" stroke-opacity="0.55"/>
    <path d="M218 380c116-11 226-10 343 4" fill="none" stroke="#c7ec97" stroke-width="5" stroke-linecap="round" stroke-opacity="0.62"/>
    <path d="M718 358c98-12 210-8 333 13" fill="none" stroke="#cad58d" stroke-width="7" stroke-linecap="round" stroke-opacity="0.5"/>
    <path d="M723 387c92-7 185 3 310 21" fill="none" stroke="#d8e2ad" stroke-width="4" stroke-linecap="round" stroke-opacity="0.48"/>

    <circle cx="774" cy="321" r="7" fill="#7d8d38"/>
    <circle cx="808" cy="333" r="9" fill="#8f9f45"/>
    <circle cx="850" cy="315" r="6" fill="#778532"/>
    <circle cx="903" cy="344" r="8" fill="#879840"/>
    <circle cx="956" cy="325" r="7" fill="#74812f"/>
    <circle cx="1002" cy="352" r="6" fill="#8a9a45"/>
    <circle cx="1044" cy="333" r="7" fill="#7a8a35"/>
    <circle cx="1087" cy="365" r="6" fill="#90a14a"/>
  </g>

  <g opacity="0.78">
    <text x="334" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#4b6f24">Smooth, vivid, even</text>
    <text x="874" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#6d6a34">Grainy, dull, uneven</text>
  </g>
</svg>
