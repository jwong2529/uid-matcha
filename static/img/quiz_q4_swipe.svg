<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 530" role="img" aria-labelledby="title desc">
  <title id="title">Three matcha swipe samples</title>
  <desc id="desc">Three matcha powder swipes on white paper, showing left as lowest grade, middle as better, and right as best.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fcfcfb"/>
      <stop offset="100%" stop-color="#f7f7f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#cfcfc8" flood-opacity="0.55"/>
    </filter>
    <filter id="finger-shadow" x="-30%" y="-20%" width="180%" height="180%">
      <feDropShadow dx="12" dy="12" stdDeviation="10" flood-color="#cbb8b1" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="swipe-left" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#a9be55" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d9ef9d" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="swipe-middle" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#a1c24f" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#d2ef8e" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="swipe-right" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#96c842" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#c7ef7a" stop-opacity="0.34"/>
    </linearGradient>
  </defs>

