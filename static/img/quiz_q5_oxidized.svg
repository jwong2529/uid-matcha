<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Fresh and oxidized matcha comparison</title>
  <desc id="desc">Side by side comparison showing bright fresh matcha on the left and dull oxidized matcha on the right.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf8f2"/>
      <stop offset="100%" stop-color="#f2ece0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#b9b1a4" flood-opacity="0.35"/>
    </filter>
    <radialGradient id="freshPowder" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#3f7f22"/>
      <stop offset="55%" stop-color="#4d9727"/>
      <stop offset="100%" stop-color="#68b33f"/>
    </radialGradient>
    <radialGradient id="oxidizedPowder" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#7e7a32"/>
      <stop offset="55%" stop-color="#8d8740"/>
      <stop offset="100%" stop-color="#a8a05b"/>
    </radialGradient>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffef9"/>
      <stop offset="100%" stop-color="#f4f1e8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)"/>
  <rect x="598" y="40" width="4" height="540" fill="#e6e0d2"/>

  <g filter="url(#shadow)">
    <rect x="84" y="94" width="440" height="430" rx="26" fill="url(#paper)"/>
    <rect x="676" y="94" width="440" height="430" rx="26" fill="url(#paper)"/>
  </g>

  <g>
    <circle cx="304" cy="184" r="34" fill="#d7eaa8"/>
    <circle cx="896" cy="184" r="34" fill="#d8d1a0"/>
    <text x="304" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#3f5a1c">A</text>
    <text x="896" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#615e2a">B</text>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="304" cy="374" rx="118" ry="42" fill="#d9d2c5" opacity="0.65"/>
    <ellipse cx="896" cy="374" rx="118" ry="42" fill="#d9d2c5" opacity="0.65"/>
  </g>

  <g>
    <path d="M214 370c28-76 146-98 206-20c27 35 25 84-12 114c-46 39-140 46-191 9c-34-25-35-63-3-103z" fill="url(#freshPowder)"/>
    <path d="M808 370c30-72 141-96 198-25c30 37 31 84-3 116c-43 41-136 50-188 15c-40-28-42-65-7-106z" fill="url(#oxidizedPowder)"/>

    <circle cx="250" cy="324" r="10" fill="#6eb645"/>
    <circle cx="278" cy="300" r="8" fill="#5aa130"/>
    <circle cx="358" cy="312" r="11" fill="#5aa130"/>
    <circle cx="389" cy="344" r="7" fill="#6eb645"/>
    <circle cx="242" cy="404" r="7" fill="#75bb4e"/>
    <circle cx="338" cy="434" r="8" fill="#6db443"/>
    <circle cx="854" cy="326" r="10" fill="#a39c57"/>
    <circle cx="874" cy="299" r="8" fill="#98904b"/>
    <circle cx="960" cy="314" r="10" fill="#8c8543"/>
    <circle cx="993" cy="350" r="7" fill="#a39c57"/>
    <circle cx="847" cy="406" r="7" fill="#aca664"/>
    <circle cx="937" cy="438" r="8" fill="#9d9650"/>
  </g>

  <g opacity="0.78">
    <path d="M208 464c41 18 150 18 194 0" fill="none" stroke="#f2ede2" stroke-width="6" stroke-linecap="round"/>
    <path d="M801 464c41 18 150 18 194 0" fill="none" stroke="#efe9da" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
